name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect changed services
        id: changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            services=$(git diff --name-only "$base" "$head" \
              | awk -F/ '/^apps\/[^/]+\// {print $2}' \
              | sort -u \
              | tr '\n' ' ')
          else
            services=$(find apps -mindepth 1 -maxdepth 1 -type d -printf '%f ' | sort)
          fi
          echo "services=${services}" >> "$GITHUB_OUTPUT"

      - name: Run pytest for changed services
        shell: bash
        run: |
          services="${{ steps.changed.outputs.services }}"
          if [[ -z "${services}" ]]; then
            echo "No app service changes detected."
            exit 0
          fi
          for service in ${services}; do
            if [[ -f "apps/${service}/requirements.txt" ]]; then
              echo "Testing ${service}"
              python -m pip install --upgrade pip
              python -m pip install -r "apps/${service}/requirements.txt"
              (cd "apps/${service}" && python -m pytest -q)
            fi
          done
