name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ENVIRONMENT: dev
      NAMESPACE: ${{ vars.NAMESPACE || 'edfp-dev' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '257536659737' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'edfp-dev-eks' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN || 'arn:aws:iam::257536659737:role/edfp-dev-github-actions' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Resolve AWS account and cluster
        run: |
          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          fi
          echo "ORDER_SERVICE_ROLE_ARN=$(aws iam get-role --role-name edfp-dev-order-service-irsa --query Role.Arn --output text)" >> "$GITHUB_ENV"
          echo "PAYMENT_SERVICE_ROLE_ARN=$(aws iam get-role --role-name edfp-dev-payment-service-irsa --query Role.Arn --output text)" >> "$GITHUB_ENV"
          echo "NOTIFICATION_WORKER_ROLE_ARN=$(aws iam get-role --role-name edfp-dev-notification-worker-irsa --query Role.Arn --output text)" >> "$GITHUB_ENV"
          echo "EXTERNAL_SECRETS_ROLE_ARN=$(aws iam get-role --role-name edfp-dev-external-secrets-irsa --query Role.Arn --output text)" >> "$GITHUB_ENV"
          echo "KEDA_OPERATOR_ROLE_ARN=$(aws iam get-role --role-name edfp-dev-keda-operator-irsa --query Role.Arn --output text)" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        run: |
          GIT_SHA="${GITHUB_SHA::12}" bash ./scripts/build-all-images.sh
          GIT_SHA="${GITHUB_SHA::12}" bash ./scripts/push-all-images.sh

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Install cluster add-ons
        run: |
          set -euo pipefail

          helm repo add external-secrets https://charts.external-secrets.io
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update

          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --wait \
            --set serviceAccount.annotations."eks\\.amazonaws\\.com/role-arn"="${EXTERNAL_SECRETS_ROLE_ARN}"

          kubectl annotate serviceaccount external-secrets \
            -n external-secrets \
            eks.amazonaws.com/role-arn="${EXTERNAL_SECRETS_ROLE_ARN}" \
            --overwrite

          kubectl wait --for=condition=Established \
            crd/externalsecrets.external-secrets.io \
            crd/clustersecretstores.external-secrets.io \
            --timeout=120s
          kubectl apply -f k8s/external-secrets/cluster-secret-store.yaml

          helm upgrade --install keda kedacore/keda \
            --namespace keda \
            --create-namespace \
            --wait \
            --set serviceAccount.operator.annotations."eks\\.amazonaws\\.com/role-arn"="${KEDA_OPERATOR_ROLE_ARN}"

          kubectl annotate serviceaccount keda-operator \
            -n keda \
            eks.amazonaws.com/role-arn="${KEDA_OPERATOR_ROLE_ARN}" \
            --overwrite

          kubectl wait --for=condition=Established \
            crd/scaledobjects.keda.sh \
            crd/triggerauthentications.keda.sh \
            --timeout=120s

      - name: Create namespace if missing
        run: kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm releases
        run: |
          set -euo pipefail
          tag="${GITHUB_SHA::12}"
          account="${AWS_ACCOUNT_ID}"
          region="${AWS_REGION}"
          ns="${NAMESPACE}"

          helm upgrade --install edfp-dev-auth-service helm/auth-service -n "$ns" -f helm/auth-service/values-dev.yaml --wait \
            --set image.repository="${account}.dkr.ecr.${region}.amazonaws.com/edfp-dev-auth-service" \
            --set image.tag="$tag"

          helm upgrade --install edfp-dev-order-service helm/order-service -n "$ns" -f helm/order-service/values-dev.yaml --wait \
            --set image.repository="${account}.dkr.ecr.${region}.amazonaws.com/edfp-dev-order-service" \
            --set image.tag="$tag" \
            --set serviceAccount.annotations."eks\\.amazonaws\\.com/role-arn"="${ORDER_SERVICE_ROLE_ARN}"

          helm upgrade --install edfp-dev-payment-service helm/payment-service -n "$ns" -f helm/payment-service/values-dev.yaml --wait \
            --set image.repository="${account}.dkr.ecr.${region}.amazonaws.com/edfp-dev-payment-service" \
            --set image.tag="$tag" \
            --set serviceAccount.annotations."eks\\.amazonaws\\.com/role-arn"="${PAYMENT_SERVICE_ROLE_ARN}"

          helm upgrade --install edfp-dev-notification-worker helm/notification-worker -n "$ns" -f helm/notification-worker/values-dev.yaml --wait \
            --set image.repository="${account}.dkr.ecr.${region}.amazonaws.com/edfp-dev-notification-worker" \
            --set image.tag="$tag" \
            --set serviceAccount.annotations."eks\\.amazonaws\\.com/role-arn"="${NOTIFICATION_WORKER_ROLE_ARN}"

          helm upgrade --install edfp-dev-api-gateway helm/api-gateway -n "$ns" -f helm/api-gateway/values-dev.yaml --wait \
            --set image.repository="${account}.dkr.ecr.${region}.amazonaws.com/edfp-dev-api-gateway" \
            --set image.tag="$tag"

      - name: Smoke test and rollback on failure
        run: |
          set +e
          ENVIRONMENT=dev NAMESPACE="${NAMESPACE}" bash ./scripts/smoke-test.sh
          result=$?
          if [[ $result -ne 0 ]]; then
            for release in edfp-dev-api-gateway edfp-dev-notification-worker edfp-dev-payment-service edfp-dev-order-service edfp-dev-auth-service; do
              helm rollback "$release" -n "${NAMESPACE}" || true
              kubectl rollout status deployment/"$release" -n "${NAMESPACE}" --timeout=120s || true
            done
            exit $result
          fi

      - name: Check pods and services
        run: |
          kubectl get pods -n "${NAMESPACE}" -o wide
          kubectl get services -n "${NAMESPACE}" -o wide
