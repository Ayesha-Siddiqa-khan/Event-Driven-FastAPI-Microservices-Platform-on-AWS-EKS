apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-worker.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "notification-worker.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      name: http
