replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

fullnameOverride: ""

serviceAccount:
  create: true
  name: api-gateway
  annotations: {}

service:
  type: ClusterIP
  port: 8000

config:
  SERVICE_NAME: api-gateway
  ENVIRONMENT: dev
  REQUEST_TIMEOUT_SECONDS: "5"
  LOG_LEVEL: INFO

externalSecrets:
  enabled: true
  secretStoreName: aws-secrets-manager
  refreshInterval: 1h
  data:
    AUTH_SERVICE_URL: /edfp/dev/api-gateway/auth-service-url
    ORDER_SERVICE_URL: /edfp/dev/api-gateway/order-service-url
    PAYMENT_SERVICE_URL: /edfp/dev/api-gateway/payment-service-url

ingress:
  enabled: true
  className: alb
  host: api.dev.example.com
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

probes:
  livenessPath: /health
  readinessPath: /ready
